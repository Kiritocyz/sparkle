name: Sync Upstream
permissions: write-all
on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.UPSTREAM_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Add upstream remote
        run: |
          UPSTREAM_REPO="${{ vars.UPSTREAM_REPO }}"
          if [ -z "$UPSTREAM_REPO" ]; then
            echo "UPSTREAM_REPO not set, skipping sync."
            exit 0
          fi
          git remote remove upstream 2>/dev/null || true
          git remote add upstream "$UPSTREAM_REPO"

      - name: Get upstream latest tag
        id: upstream_tag
        env:
          UPSTREAM_REPO: ${{ vars.UPSTREAM_REPO }}
          UPSTREAM_TOKEN: ${{ secrets.UPSTREAM_TOKEN }}
        run: |
          if [ -z "$UPSTREAM_REPO" ]; then
            echo "tag=" >> $GITHUB_OUTPUT
            exit 0
          fi
          REPO_PATH="${UPSTREAM_REPO#https://github.com/}"
          REPO_PATH="${REPO_PATH#git@github.com:}"
          REPO_PATH="${REPO_PATH%.git}"
          UPSTREAM_TAG=$(curl -s -H "Authorization: Bearer $UPSTREAM_TOKEN" \
            "https://api.github.com/repos/$REPO_PATH/tags?per_page=100" \
            | jq -r '.[].name' | grep -v pre-release | grep -E '^[0-9]+\.' | sort -V | tail -1)
          if [ -z "$UPSTREAM_TAG" ]; then
            echo "No upstream version tag found." >&2
            echo "tag=" >> $GITHUB_OUTPUT
          else
            echo "Upstream latest tag: $UPSTREAM_TAG"
            echo "tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Fetch upstream tags and branches
        run: |
          UPSTREAM_REPO="${{ vars.UPSTREAM_REPO }}"
          if [ -z "$UPSTREAM_REPO" ]; then exit 0; fi
          git fetch upstream --tags --force

      - name: Merge upstream master
        run: |
          UPSTREAM_REPO="${{ vars.UPSTREAM_REPO }}"
          if [ -z "$UPSTREAM_REPO" ]; then exit 0; fi
          git checkout master
          MERGE_BASE=$(git merge-base master upstream/master)
          COMMITS=$(git rev-list --reverse "$MERGE_BASE..upstream/master" \
            | grep -v -e "6d8999dd3e1cb7817aef80f9c73908026295938b" \
                      -e "24814c7fbb021d7f1c1bd9fc6044046ae406ad27")
          if [ -n "$COMMITS" ]; then
            echo "$COMMITS" | xargs -r git cherry-pick -X ours 2>/dev/null || true
          fi
          echo "Merge complete, skipped commits 6d8999dd, 24814c7f"

      - name: Push merged code to master
        run: |
          UPSTREAM_REPO="${{ vars.UPSTREAM_REPO }}"
          if [ -z "$UPSTREAM_REPO" ]; then exit 0; fi
          git push origin master

      - name: Push new tag if not exists
        if: steps.upstream_tag.outputs.tag != ''
        run: |
          UPSTREAM_TAG="${{ steps.upstream_tag.outputs.tag }}"
          if git ls-remote --tags origin | grep -q "refs/tags/$UPSTREAM_TAG"; then
            echo "Tag $UPSTREAM_TAG already exists, skipping."
          else
            # 创建轻量 tag 指向当前 master（合并后的最新 commit）
            git tag -f "$UPSTREAM_TAG"
            git push origin "refs/tags/$UPSTREAM_TAG"
            echo "Pushed tag $UPSTREAM_TAG"
          fi
