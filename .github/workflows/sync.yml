name: Sync Upstream
permissions: write-all
on:
  schedule:
    - cron: '0 20 * * *'  # 每天 20:00 UTC = 北京时间次日 4:00
  workflow_dispatch:  # 允许手动触发

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Add upstream remote
        run: |
          UPSTREAM_REPO="${{ vars.UPSTREAM_REPO }}"
          if [ -z "$UPSTREAM_REPO" ]; then
            echo "UPSTREAM_REPO not set, skipping sync."
            exit 0
          fi
          git remote remove upstream 2>/dev/null || true
          git remote add upstream "$UPSTREAM_REPO"

      - name: Fetch upstream tags and branches
        run: |
          UPSTREAM_REPO="${{ vars.UPSTREAM_REPO }}"
          if [ -z "$UPSTREAM_REPO" ]; then exit 0; fi
          git fetch upstream --tags

      - name: Merge upstream master
        run: |
          UPSTREAM_REPO="${{ vars.UPSTREAM_REPO }}"
          if [ -z "$UPSTREAM_REPO" ]; then exit 0; fi
          git checkout master
          git merge upstream/master --no-edit || git merge --strategy=recursive --strategy-option=ours upstream/master

      - name: Get upstream latest tag
        id: upstream_tag
        run: |
          UPSTREAM_REPO="${{ vars.UPSTREAM_REPO }}"
          if [ -z "$UPSTREAM_REPO" ]; then
            echo "tag=" >> $GITHUB_OUTPUT
            exit 0
          fi
          UPSTREAM_TAG=$(git tag -l upstream/v* | grep -v pre-release | sort -V | tail -1)
          if [ -z "$UPSTREAM_TAG" ]; then
            echo "No upstream version tag found." >&2
            echo "tag=" >> $GITHUB_OUTPUT
          else
            CLEAN_TAG="${UPSTREAM_TAG#upstream/}"
            echo "Upstream latest tag: $CLEAN_TAG"
            echo "tag=$CLEAN_TAG" >> $GITHUB_OUTPUT
            echo "upstream_raw=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Get local latest tag
        id: local_tag
        run: |
          LOCAL_TAG=$(git tag -l v* | grep -v pre-release | sort -V | tail -1)
          echo "Local latest tag: $LOCAL_TAG"
          echo "tag=$LOCAL_TAG" >> $GITHUB_OUTPUT

      - name: Get upstream tag changelog
        if: steps.upstream_tag.outputs.tag != '' && steps.upstream_tag.outputs.upstream_raw != ''
        run: |
          UPSTREAM_TAG="${{ steps.upstream_tag.outputs.upstream_raw }}"
          CHANGELOG=$(git log -1 --pretty=format:"%s%n%b" "$UPSTREAM_TAG")
          CHANGELOG="${CHANGELOG//xishang0128/Kiritocyz}"
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Push new tag
        if: steps.upstream_tag.outputs.tag != '' && steps.upstream_tag.outputs.tag != steps.local_tag.outputs.tag
        run: |
          UPSTREAM_TAG="${{ steps.upstream_tag.outputs.tag }}"
          git tag "$UPSTREAM_TAG"
          git push origin "$UPSTREAM_TAG"

      - name: Trigger Build
        if: steps.upstream_tag.outputs.tag != '' && steps.upstream_tag.outputs.tag != steps.local_tag.outputs.tag
        run: |
          echo "Tag ${{ steps.upstream_tag.outputs.tag }} pushed. Build workflow will trigger automatically."
