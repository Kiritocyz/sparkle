name: Sync Upstream
permissions: write-all
on:
  schedule:
    - cron: '0 20 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git config --global user.name "github-actions[bot]"

      - name: Add upstream remote
        run: |
          UPSTREAM_REPO="${{ vars.UPSTREAM_REPO }}"
          if [ -z "$UPSTREAM_REPO" ]; then
            echo "UPSTREAM_REPO not set, skipping sync."
            exit 0
          fi
          git remote remove upstream 2>/dev/null || true
          git remote add upstream "$UPSTREAM_REPO"

      - name: Get upstream latest tag
        id: upstream_tag
        env:
          UPSTREAM_REPO: ${{ vars.UPSTREAM_REPO }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -z "$UPSTREAM_REPO" ]; then
            echo "tag=" >> $GITHUB_OUTPUT
            exit 0
          fi
          REPO_PATH="${UPSTREAM_REPO#https://github.com/}"
          REPO_PATH="${REPO_PATH#git@github.com:}"
          REPO_PATH="${REPO_PATH%.git}"
          UPSTREAM_TAG=$(curl -s -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/$REPO_PATH/tags?per_page=1" \
            | jq -r '.[].name' | grep -v pre-release | head -1)
          if [ -z "$UPSTREAM_TAG" ]; then
            echo "No upstream version tag found." >&2
            echo "tag=" >> $GITHUB_OUTPUT
          else
            echo "Upstream latest tag: $UPSTREAM_TAG"
            echo "tag=$UPSTREAM_TAG" >> $GITHUB_OUTPUT
          fi

      - name: Fetch upstream tags and branches
        run: |
          UPSTREAM_REPO="${{ vars.UPSTREAM_REPO }}"
          if [ -z "$UPSTREAM_REPO" ]; then exit 0; fi
          git fetch upstream --tags --force

      - name: Merge upstream master
        run: |
          UPSTREAM_REPO="${{ vars.UPSTREAM_REPO }}"
          if [ -z "$UPSTREAM_REPO" ]; then exit 0; fi
          git checkout master
          git merge upstream/master --no-edit || git merge --strategy=recursive --strategy-option=ours upstream/master

      - name: Push merged code to master
        run: |
          UPSTREAM_REPO="${{ vars.UPSTREAM_REPO }}"
          if [ -z "$UPSTREAM_REPO" ]; then exit 0; fi
          git push origin master

      - name: Get upstream tag changelog
        if: steps.upstream_tag.outputs.tag != ''
        run: |
          UPSTREAM_TAG="${{ steps.upstream_tag.outputs.tag }}"
          CHANGELOG=$(git log -1 --pretty=format:"%s%n%b" "$UPSTREAM_TAG")
          CHANGELOG="${CHANGELOG//xishang0128/Kiritocyz}"
          echo "changelog<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGELOG" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Push new tag if not exists
        if: steps.upstream_tag.outputs.tag != ''
        run: |
          UPSTREAM_TAG="${{ steps.upstream_tag.outputs.tag }}"
          LOCAL_TAG="v$UPSTREAM_TAG"
          if git tag -l "$LOCAL_TAG" | grep -q "$LOCAL_TAG"; then
            echo "Tag $LOCAL_TAG already exists, skipping."
          else
            git tag "$LOCAL_TAG"
            git push origin "$LOCAL_TAG"
            echo "Pushed tag $LOCAL_TAG"
          fi